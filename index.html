<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance • Office</title>
  <style>
    :root {
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --bg: #0a0f1c;
      --card: #111827;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 15px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 15px;
      margin-bottom: 28px;
    }

    select, button {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-bottom: 16px;
    }

    select {
      background: #1e2937;
      color: white;
      cursor: pointer;
    }

    .status {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      margin: 12px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 500;
    }

    .approved {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .rejected {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    video {
      width: 100%;
      max-width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid var(--primary);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
      margin: 20px auto;
      display: block;
    }

    #preview {
      width: 100%;
      max-width: 260px;
      height: 260px;
      object-fit: cover;
      border-radius: 50%;
      border: 5px solid var(--primary);
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
      margin: 20px auto;
      display: none;
    }

    button {
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-capture {
      background: #334155;
      color: white;
    }

    .btn-capture:hover {
      background: #475569;
      transform: translateY(-2px);
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      font-size: 17px;
      padding: 16px;
    }

    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #result {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.4s ease;
    }

    .result-content {
      text-align: center;
      padding: 40px 30px;
      animation: zoomIn 0.5s ease;
    }

    @keyframes zoomIn {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Chhtrabandhu Attendance</h1>
  <p class="subtitle">Mark your presence</p>

  <select id="employee">
    <option value="">Select Employee</option>
    <option>Sonali Mishra</option>
    <option>Dhriti Dipa Mallick</option>
    <option>GUEST-1</option>
    <option>..</option>
  </select>

  <select id="action">
    <option value="">Select Action</option>
    <option>Entry</option>
    <option>Tiffin Exit</option>
    <option>Tiffin Entry</option>
    <option>Exit</option>
  </select>

  <div id="locationStatus" class="status">
    <span>Checking location...</span>
  </div>

  <video id="video" autoplay playsinline></video>
  <img id="preview" alt="Selfie Preview">

  <button class="btn-capture" onclick="capture()">📸 Capture Selfie</button>
  <button class="btn-submit" onclick="submitAttendance()" id="submitBtn">Submit Attendance</button>
  
  <canvas id="canvas" style="display:none"></canvas>
</div>

<!-- Result Overlay -->
<div id="result">
  <div class="result-content" id="resultContent"></div>
</div>

<script>
const OFFICE_LAT = 23.233464916200468;
const OFFICE_LON = 87.86576908748658;
const RADIUS = 100;

let imageData = "";
let locationApproved = false;

const video = document.getElementById("video");
const preview = document.getElementById("preview");
const locationStatus = document.getElementById("locationStatus");
const submitBtn = document.getElementById("submitBtn");

// Camera
function initApp() {

  imageData = "";
  locationApproved = false;

  preview.style.display = "none";
  video.style.display = "block";

  // Camera
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    console.error("Camera error:", err);
  });

  // Location
  navigator.geolocation.getCurrentPosition(
    pos => {
      const dist = getDistance(
        pos.coords.latitude,
        pos.coords.longitude,
        OFFICE_LAT,
        OFFICE_LON
      );

      if (dist < RADIUS) {
        locationStatus.className = "status approved";
        locationStatus.innerHTML = "✅ Location Approved • Inside Office";
        locationApproved = true;
      } else {
        locationStatus.className = "status rejected";
        locationStatus.innerHTML = "❌ Outside Office Radius";
      }
    },
    () => {
      locationStatus.className = "status rejected";
      locationStatus.innerHTML = "❌ Location access denied";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );
}

window.addEventListener("load", initApp);

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function capture() {
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  
  imageData = canvas.toDataURL("image/png");
  preview.src = imageData;
  preview.style.display = "block";
  video.style.display = "none";
}

function submitAttendance() {
  if (!locationApproved) {
    alert("Please be inside the office to mark attendance");
    return;
  }
  if (!imageData) {
    alert("Please capture your selfie first");
    return;
  }

  const employee = document.getElementById("employee").value;
  const action = document.getElementById("action").value;

  if (!employee || !action) {
    alert("Please select employee and action");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' , second: '2-digit'});
  const date = now.toISOString().split('T')[0];

  fetch("https://script.google.com/macros/s/AKfycbwDZ1clDQI8JeUcbBOzLSUWbWy1QrUeqXfGI7Df74Mj_3fxjrJDQ8As5X4REEupwl8u/exec", {
    method: "POST",
    body: new URLSearchParams({ employee, action, time, date, image: imageData })
  })
  .then(res => res.text())
  .then(data => {
    showResult(data.trim(), employee, action, time);
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Attendance";
  });
}

function showResult(status, employee, action, time) {
  const resultDiv = document.getElementById("result");
  const content = document.getElementById("resultContent");

  let html = "";

  if (status === "NAME_ERROR") {
    html = `<h2 style="color:#ef4444">❌ Name Error</h2>`;
  } else if (status === "ENTRY_REQUIRED") {
    html = `<h2 style="color:#f59e0b">⚠ First action must be Entry</h2>`;
  } else if (status === "ALREADY") {
    html = `<h2 style="color:#eab308">${employee}<br>Already Marked</h2>`;
  } else {
    html = `
      <h2 style="color:#22c55e; font-size:42px">✅ Success</h2>
      <p style="margin:15px 0; font-size:18px">Attendance Recorded</p>
      <p><strong>${employee}</strong></p>
      <p>${action} • ${time}</p>
    `;
  }

  content.innerHTML = html;
  resultDiv.style.display = "flex";

  // Auto hide after 4 seconds
  setTimeout(() => {
    resultDiv.style.display = "none";
    // Reset preview
    preview.style.display = "none";
    video.style.display = "block";
    imageData = "";
  }, 4500);
}
</script>
</body>
</html>
